<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagex</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app" id="app" data-status="idle">
      <header class="hero">
        <div class="hero__row">
          <span class="hero__flag">Pagex</span>
          <span class="hero__status" id="statusText" aria-live="polite">Ready</span>
        </div>
        <div class="hero__brand">
          <img
            class="hero__logo"
            src="assets/icons/pagex-128.png"
            alt="Pagex PX logo"
          />
          <div class="hero__identity">
            <span class="hero__label">Extract any page into AI-ready JSON</span>
            <h1 class="hero__title">Pagex</h1>
          </div>
        </div>
        <p class="hero__subtitle" id="detailText" aria-live="polite">
          Step 1: Pick a tab below · Step 2: Click Extract · Step 3: Copy the JSON
        </p>
        <div class="hero__progress" role="progressbar" aria-label="Parse progress"></div>
      </header>

      <section class="panel">
        <label class="field" for="tabSelect">
          <span class="field__label">Which page to extract?</span>
          <select id="tabSelect" class="field__input"></select>
        </label>

        <div class="actions">
          <button id="parseBtn" class="button button--primary" type="button">
            Extract Page
          </button>
          <button
            id="copyBtn"
            class="button button--secondary"
            type="button"
            disabled
          >
            Copy JSON
          </button>
        </div>
      </section>

      <section class="summary">
        <div class="summary__header">Extraction results</div>
        <div class="summary__grid">
          <article class="metric">
            <span class="metric__label">Frames</span>
            <strong class="metric__value" id="framesValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">Elements</span>
            <strong class="metric__value" id="elementsValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">Clicks</span>
            <strong class="metric__value" id="clicksValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">Size</span>
            <strong class="metric__value" id="sizeValue">-</strong>
          </article>
        </div>
        <p class="summary__note" id="summaryNote">
          No captured page yet.
        </p>
      </section>

      <footer class="footer">
        <span class="footer__hint" id="copyFeedback" aria-live="polite">
          Everything stays on your device. Nothing is sent anywhere.
        </span>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
